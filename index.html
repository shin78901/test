<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Pixel Quest Mobile</title>
  <style>
    :root{--ink:#111827;--paper:#fff;--yellow:#fbbf24;--blue:#2563eb;--safe-t:max(8px,env(safe-area-inset-top));--safe-b:max(10px,env(safe-area-inset-bottom))}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;overscroll-behavior:none;background:#0f172a;color:var(--ink);font-family:ui-rounded,"SF Pro Rounded",system-ui,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}
    body{display:grid;place-items:center}
    .app{width:min(100vw,480px);height:100dvh;max-height:940px;display:grid;grid-template-rows:auto minmax(0,1fr) auto;padding:var(--safe-t) 8px var(--safe-b);background:linear-gradient(#38bdf8 0 64%,#d9f99d 64%)}
    .top{z-index:4;display:flex;align-items:center;justify-content:space-between;gap:6px;padding:0 2px 7px}
    .brand{margin:0;font-size:clamp(16px,5vw,23px);font-weight:1000;letter-spacing:.02em;color:#fff;text-shadow:0 3px 0 #111827}
    .hud{display:flex;gap:5px;font-size:clamp(12px,3.5vw,16px);font-weight:1000}
    .pill{min-width:55px;padding:7px 8px;text-align:center;background:#ffffffeb;border:2px solid var(--ink);border-radius:999px;box-shadow:2px 2px 0 var(--ink)}
    .stage{position:relative;min-height:0;overflow:hidden;border:3px solid var(--ink);border-radius:20px;background:#38bdf8;box-shadow:5px 5px 0 #020617}
    canvas{display:block;width:100%;height:100%;image-rendering:pixelated;touch-action:none}
    .tap-hint{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:2;padding:6px 10px;border:2px solid #111827;border-radius:999px;background:#ffffffc9;font-size:12px;font-weight:1000;pointer-events:none;transition:.25s}
    .tap-hint.fade{opacity:0;transform:translate(-50%,-8px)}
    .overlay{position:absolute;inset:0;z-index:5;display:grid;place-items:center;padding:18px;background:#0f172ac9;text-align:center}
    .panel{width:min(100%,350px);padding:22px 17px;background:var(--paper);border:3px solid var(--ink);border-radius:22px;box-shadow:6px 6px 0 var(--ink)}
    .panel h2{margin:0 0 10px;font-size:clamp(30px,10vw,46px);line-height:.95}
    .panel p{margin:8px 0;line-height:1.45;font-weight:750}
    .panel .small{font-size:13px;color:#475569}
    button{font:inherit;font-weight:1000;color:var(--ink);border:3px solid var(--ink);cursor:pointer;touch-action:none}
    .start{width:100%;margin-top:10px;padding:14px;border-radius:14px;background:var(--yellow);box-shadow:4px 4px 0 var(--ink);font-size:18px}
    .start:active,.control:active,.control.active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink);filter:brightness(.95)}
    .controls{display:grid;grid-template-columns:1fr 1fr 1.18fr;gap:9px;padding:11px 2px 0}
    .control{height:clamp(68px,10.5vh,92px);border-radius:22px;background:#fff;box-shadow:4px 4px 0 var(--ink);font-size:30px}
    .control.jump{background:var(--yellow);font-size:22px}
    .control span{display:block;font-size:10px;line-height:1;margin-top:3px;letter-spacing:.06em}
    .hidden{display:none}
    @media (min-width:700px){.app{height:min(920px,100dvh);border-left:1px solid #334155;border-right:1px solid #334155}.control{height:82px}}
    @media (max-height:650px){.app{padding-top:4px}.top{padding-bottom:4px}.brand{font-size:16px}.pill{padding:4px 6px}.controls{padding-top:6px}.control{height:60px}.panel{padding:16px}.panel p{margin:5px 0}}
  </style>
</head>
<body>
  <main class="app">
    <header class="top"><h1 class="brand">PIXEL QUEST</h1><div class="hud"><div class="pill">⭐ <span id="score">0</span></div><div class="pill">❤️ <span id="lives">3</span></div><div class="pill">🏁 <span id="level">1</span>/3</div></div></header>
    <section class="stage" id="stage"><canvas id="game" width="450" height="720" aria-label="横スクロールアクションゲーム"></canvas><div class="tap-hint" id="hint">画面タップでジャンプ</div><div class="overlay" id="overlay"><div class="panel"><h2 id="title">PIXEL<br>QUEST</h2><p id="message">スターを集めてポータルへ進もう</p><p class="small">左右は下のボタンを長押し<br>画面タップ・上スワイプでジャンプ</p><button class="start" id="start">ゲームスタート</button></div></div></section>
    <nav class="controls" aria-label="ゲーム操作"><button class="control" data-key="left" aria-label="左へ移動">◀<span>ひだり</span></button><button class="control" data-key="right" aria-label="右へ移動">▶<span>みぎ</span></button><button class="control jump" data-key="jump" aria-label="ジャンプ">JUMP<span>タップ</span></button></nav>
  </main>
<script>
(()=>{const c=document.querySelector('#game'),g=c.getContext('2d'),stage=document.querySelector('#stage'),scoreEl=document.querySelector('#score'),livesEl=document.querySelector('#lives'),levelEl=document.querySelector('#level'),overlay=document.querySelector('#overlay'),titleEl=document.querySelector('#title'),msgEl=document.querySelector('#message'),startBtn=document.querySelector('#start'),hint=document.querySelector('#hint'),W=c.width,H=c.height,G=.78,key={left:false,right:false,jump:false};let score=0,lives=3,level=0,running=false,last=0,cam=0,jumpLock=false,gesture=null,moveTimer=0;const levels=[{width:2050,spawn:[70,555],portal:[1930,470],platforms:[[0,635,450,85],[530,590,220,130],[835,535,190,185],[1110,620,280,100],[1480,565,220,155],[1785,620,265,100]],stars:[[230,550],[620,505],[900,450],[1240,535],[1570,480],[1880,535]],enemies:[[640,550,530,720],[1280,580,1110,1360],[1580,525,1480,1670]]},{width:2440,spawn:[65,555],portal:[2325,425],platforms:[[0,635,330,85],[410,570,200,150],[700,500,190,220],[980,600,250,120],[1320,530,180,190],[1590,620,240,100],[1920,550,200,170],[2200,505,240,215]],stars:[[170,550],[490,485],[770,415],[1100,515],[1380,445],[1700,535],[1990,465],[2290,420]],enemies:[[480,530,410,590],[1080,560,980,1210],[1680,580,1590,1810],[2250,465,2200,2390]]},{width:2810,spawn:[65,555],portal:[2690,365],platforms:[[0,635,300,85],[385,565,170,155],[640,495,175,225],[900,605,235,115],[1225,530,165,190],[1480,455,180,265],[1750,595,240,125],[2080,520,175,200],[2340,445,180,275],[2600,575,210,145]],stars:[[145,550],[445,480],[700,410],[1000,520],[1280,445],[1540,370],[1850,510],[2140,435],[2400,360],[2670,490]],enemies:[[450,525,385,535],[990,565,900,1115],[1810,555,1750,1970],[2640,535,2600,2780]]}],p={x:0,y:0,w:34,h:44,vx:0,vy:0,on:false,face:1,inv:0};let world,stars,enemies,particles=[];const clamp=(n,a,b)=>Math.max(a,Math.min(b,n)),hit=(a,b)=>a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y,buzz=n=>navigator.vibrate?.(n);function reset(full=false){if(full){score=0;lives=3;level=0}world=levels[level];stars=world.stars.map(([x,y])=>({x,y,w:25,h:25,taken:false,t:Math.random()*6}));enemies=world.enemies.map(([x,y,min,max])=>({x,y,w:36,h:32,vx:1.2,min,max,dead:false}));particles=[];[p.x,p.y]=world.spawn;p.vx=p.vy=0;p.inv=0;cam=0;scoreEl.textContent=score;livesEl.textContent=lives;levelEl.textContent=level+1}function start(){reset(true);overlay.classList.add('hidden');hint.classList.remove('fade');running=true;last=performance.now();requestAnimationFrame(loop)}function show(title,msg,button='もう一度'){running=false;titleEl.innerHTML=title;msgEl.textContent=msg;startBtn.textContent=button;overlay.classList.remove('hidden')}function burst(x,y,ch='⭐'){for(let i=0;i<8;i++)particles.push({x,y,vx:(Math.random()-.5)*6,vy:-Math.random()*5-1,t:32,ch})}function jump(){key.jump=true;setTimeout(()=>key.jump=false,90);hint.classList.add('fade');buzz(12)}function die(){if(p.inv>0)return;lives--;livesEl.textContent=lives;burst(p.x,p.y,'✦');buzz([40,35,40]);if(lives<=0){show('GAME<br>OVER',`スコア ${score}`);return}[p.x,p.y]=world.spawn;p.vx=p.vy=0;p.inv=110;cam=0}function finish(){score+=500;scoreEl.textContent=score;buzz([30,30,60]);if(level===levels.length-1){show('YOU<br>WIN!',`最終スコア ${score}`);return}level++;reset()}function update(){const accel=.75,max=5.15;if(key.left){p.vx-=accel;p.face=-1}if(key.right){p.vx+=accel;p.face=1}if(!key.left&&!key.right)p.vx*=.78;p.vx=clamp(p.vx,-max,max);if(key.jump&&!jumpLock&&p.on){p.vy=-14;p.on=false;jumpLock=true;burst(p.x+17,p.y+42,'·')}if(!key.jump)jumpLock=false;p.vy+=G;p.x+=p.vx;p.x=clamp(p.x,0,world.width-p.w);for(const q of world.platforms){const b={x:q[0],y:q[1],w:q[2],h:q[3]};if(hit(p,b)){if(p.vx>0)p.x=b.x-p.w;else if(p.vx<0)p.x=b.x+b.w;p.vx=0}}p.y+=p.vy;p.on=false;for(const q of world.platforms){const b={x:q[0],y:q[1],w:q[2],h:q[3]};if(hit(p,b)){if(p.vy>0){p.y=b.y-p.h;p.vy=0;p.on=true}else if(p.vy<0){p.y=b.y+b.h;p.vy=0}}}if(p.y>H+100)die();if(p.inv>0)p.inv--;for(const s of stars){s.t+=.08;if(!s.taken&&hit(p,s)){s.taken=true;score+=100;scoreEl.textContent=score;burst(s.x,s.y);buzz(18)}}for(const e of enemies){if(e.dead)continue;e.x+=e.vx;if(e.x<e.min||e.x>e.max){e.vx*=-1;e.x=clamp(e.x,e.min,e.max)}if(hit(p,e)){const stomp=p.vy>2&&p.y+p.h-e.y<22;if(stomp){e.dead=true;p.vy=-9;score+=200;scoreEl.textContent=score;burst(e.x,e.y,'💥');buzz(25)}else die()}}if(hit(p,{x:world.portal[0],y:world.portal[1],w:56,h:100}))finish();for(const q of particles){q.x+=q.vx;q.y+=q.vy;q.vy+=.2;q.t--}particles=particles.filter(q=>q.t>0);const target=clamp(p.x-W*.35,0,world.width-W);cam+=(target-cam)*.09}function rect(x,y,w,h,fill,stroke='#111827',lw=3){g.fillStyle=fill;g.fillRect(Math.round(x-cam),Math.round(y),w,h);if(stroke){g.strokeStyle=stroke;g.lineWidth=lw;g.strokeRect(Math.round(x-cam),Math.round(y),w,h)}}function draw(){g.clearRect(0,0,W,H);const sky=g.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#38bdf8');sky.addColorStop(1,'#bae6fd');g.fillStyle=sky;g.fillRect(0,0,W,H);g.fillStyle='#ffffffa8';for(let i=0;i<12;i++){const x=((i*270-cam*.17)%(world.width+350))-90,y=85+(i%4)*62;g.beginPath();g.arc(x,y,22,0,Math.PI*2);g.arc(x+24,y-8,30,0,Math.PI*2);g.arc(x+54,y,21,0,Math.PI*2);g.fill()}g.fillStyle='#86efac';for(let i=0;i<18;i++){const x=i*220-cam*.43;g.beginPath();g.moveTo(x,635);g.lineTo(x+92,340+(i%3)*42);g.lineTo(x+185,635);g.fill()}for(const [x,y,w,h] of world.platforms){rect(x,y,w,h,'#92400e');rect(x,y,w,19,'#22c55e');g.fillStyle='#fbbf24';for(let i=10;i<w;i+=34)g.fillRect(x+i-cam,y+34,10,6)}for(const s of stars){if(s.taken)continue;const bob=Math.sin(s.t)*6;g.save();g.translate(s.x-cam+12,s.y+bob+12);g.rotate(s.t*.25);g.fillStyle='#fde047';g.strokeStyle='#111827';g.lineWidth=3;g.beginPath();for(let i=0;i<10;i++){const a=-Math.PI/2+i*Math.PI/5,r=i%2?6:13;g.lineTo(Math.cos(a)*r,Math.sin(a)*r)}g.closePath();g.fill();g.stroke();g.restore()}for(const e of enemies){if(e.dead)continue;rect(e.x,e.y,e.w,e.h,'#ef4444');g.fillStyle='#fff';g.fillRect(e.x-cam+7,e.y+7,7,8);g.fillRect(e.x-cam+22,e.y+7,7,8);g.fillStyle='#111827';g.fillRect(e.x-cam+10,e.y+10,3,5);g.fillRect(e.x-cam+22,e.y+10,3,5);g.fillRect(e.x-cam+7,e.y+28,8,5);g.fillRect(e.x-cam+22,e.y+28,8,5)}const [x,y]=world.portal;g.strokeStyle='#7c3aed';g.lineWidth=10;g.beginPath();g.ellipse(x-cam+28,y+50,25,45,0,0,Math.PI*2);g.stroke();g.strokeStyle='#c4b5fd';g.lineWidth=4;g.stroke();g.fillStyle='#ffffff88';g.beginPath();g.ellipse(x-cam+28,y+50,16,34,0,0,Math.PI*2);g.fill();if(!(p.inv>0&&Math.floor(p.inv/6)%2)){const x=p.x-cam,y=p.y;rect(p.x,y,p.w,p.h,'#2563eb');g.fillStyle='#fcd34d';g.fillRect(x+7,y+6,20,15);g.fillStyle='#111827';g.fillRect(x+(p.face>0?20:10),y+10,4,5);g.fillStyle='#f97316';g.fillRect(x+4,y-3,26,9);g.fillStyle='#111827';g.fillRect(x+4,y+40,10,6);g.fillRect(x+20,y+40,10,6)}g.font='18px system-ui';g.textAlign='center';for(const q of particles){g.globalAlpha=q.t/32;g.fillText(q.ch,q.x-cam,q.y)}g.globalAlpha=1}function loop(t){if(!running)return;const steps=Math.min(2,Math.max(1,Math.round((t-last)/16.67)));last=t;for(let i=0;i<steps;i++)update();draw();requestAnimationFrame(loop)}const map={ArrowLeft:'left',a:'left',A:'left',ArrowRight:'right',d:'right',D:'right',ArrowUp:'jump',w:'jump',W:'jump',' ':'jump'};addEventListener('keydown',e=>{if(map[e.key]){key[map[e.key]]=true;e.preventDefault()}if(e.key==='r'||e.key==='R')reset()},{passive:false});addEventListener('keyup',e=>{if(map[e.key]){key[map[e.key]]=false;e.preventDefault()}},{passive:false});document.querySelectorAll('[data-key]').forEach(b=>{const k=b.dataset.key,on=e=>{e.preventDefault();b.classList.add('active');if(k==='jump')jump();else key[k]=true;b.setPointerCapture?.(e.pointerId)},off=e=>{e.preventDefault();b.classList.remove('active');if(k!=='jump')key[k]=false};b.addEventListener('pointerdown',on);b.addEventListener('pointerup',off);b.addEventListener('pointercancel',off);b.addEventListener('lostpointercapture',off)});stage.addEventListener('pointerdown',e=>{if(!running)return;gesture={x:e.clientX,y:e.clientY,t:performance.now()};stage.setPointerCapture?.(e.pointerId)});stage.addEventListener('pointerup',e=>{if(!running||!gesture)return;const dx=e.clientX-gesture.x,dy=e.clientY-gesture.y,dt=performance.now()-gesture.t;gesture=null;if(dy<-35){jump();return}if(Math.abs(dx)>40&&Math.abs(dx)>Math.abs(dy)){const dir=dx<0?'left':'right';clearTimeout(moveTimer);key.left=key.right=false;key[dir]=true;moveTimer=setTimeout(()=>key[dir]=false,Math.min(520,220+Math.abs(dx)));buzz(10);return}if(dt<420)jump()});stage.addEventListener('pointercancel',()=>gesture=null);startBtn.addEventListener('click',start);document.addEventListener('contextmenu',e=>e.preventDefault());reset(true);draw()})();
</script>
</body>
</html>
